<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Advisor AI — Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pro-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex flex-col items-center p-4 md:p-10">

    <!-- Top Navigation / Settings -->
    <div class="w-full max-w-4xl flex flex-col md:flex-row gap-4 mb-10 animate-fade-in">
        <div class="flex-1 glass p-4 rounded-2xl flex items-center gap-3">
            <i class="fas fa-link text-indigo-400"></i>
            <input type="text" id="baseUrl" value="https://city-advisor.onrender.com" 
                class="bg-transparent border-none outline-none w-full text-sm font-medium" placeholder="Backend URL">
        </div>
        <div class="glass p-4 rounded-2xl flex items-center gap-3">
            <i class="fas fa-lock text-purple-400"></i>
            <input type="password" id="apiKey" value="secret-vibe-123" 
                class="bg-transparent border-none outline-none w-64 text-sm font-medium" placeholder="App Key">
        </div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-4xl text-center mb-12 animate-fade-in" style="animation-delay: 0.1s">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-4 text-white">
            Your AI <span class="text-transparent bg-clip-text pro-gradient">Travel Agent</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
            Get personalized city recommendations based on live weather and local insights.
        </p>
    </div>

    <!-- Search Box -->
    <div class="w-full max-w-3xl glass p-2 rounded-3xl mb-12 flex items-center shadow-2xl animate-fade-in" style="animation-delay: 0.2s">
        <input type="text" id="query" placeholder="Tell me what you want to do and in which city..." 
            class="flex-1 bg-transparent p-4 md:p-6 text-lg outline-none border-none placeholder:text-slate-500">
        <button id="planBtn" class="pro-gradient px-8 py-4 md:py-5 rounded-2xl font-bold text-white shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
            <span id="btnText">Plan Adventure</span>
            <div id="spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
    </div>

    <!-- Result Area -->
    <div id="resultArea" class="w-full max-w-4xl hidden space-y-6 animate-fade-in">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Weather Card -->
            <div class="glass p-6 rounded-3xl border-l-4 border-indigo-500">
                <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2">Live Weather</p>
                <div class="flex items-center justify-between">
                    <h2 id="cityDisplay" class="text-2xl font-bold">City</h2>
                    <span id="tempDisplay" class="text-3xl font-black text-white">--°C</span>
                </div>
            </div>
            <!-- Status Card -->
            <div class="md:col-span-2 glass p-6 rounded-3xl border-l-4 border-emerald-500 flex items-center">
                <p class="text-slate-400 italic">"The AI has analyzed your request and considered the local conditions..."</p>
            </div>
        </div>

        <!-- Recommendation Card -->
        <div class="glass p-8 md:p-10 rounded-3xl shadow-xl">
            <div id="aiContent" class="prose prose-invert prose-p:leading-relaxed prose-li:my-2 max-w-none text-slate-300">
                <!-- AI Content Goes Here -->
            </div>
        </div>
    </div>

    <script>
        const planBtn = document.getElementById('planBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const aiContent = document.getElementById('aiContent');

        planBtn.addEventListener('click', async () => {
            const query = document.getElementById('query').value;
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;

            if (!query) return;

            // Loading state
            planBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.innerText = 'Thinking...';
            resultArea.classList.add('hidden');

            try {
                const response = await fetch(`${baseUrl}/advisor?query=${encodeURIComponent(query)}&x-api-key=${apiKey}`);
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('cityDisplay').innerText = data.city;
                    document.getElementById('tempDisplay').innerText = `${data.weather.temp}°C`;
                    aiContent.innerHTML = marked.parse(data.recommendation);
                    resultArea.classList.remove('hidden');
                    window.scrollTo({ top: resultArea.offsetTop - 50, behavior: 'smooth' });
                } else {
                    alert("Error: " + data.message);
                }
            } catch (error) {
                alert("Cannot connect to Backend. Is your Render server Live?");
            } finally {
                planBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.innerText = 'Plan Adventure';
            }
        });
    </script>
</body>
</html>
